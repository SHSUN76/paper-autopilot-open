# active_reviewers_alpha.yaml
# Phase 1 T4 산출물 (paper-autopilot v1.1.0-alpha)
# 9 aw-* reviewer 중 alpha 단계 활성/비활성 명시
# Source: design doc P3 표 + outside voice #8 fix (Hybrid-D)

meta:
  alpha_version: "v1.1.0-alpha"
  generated_at: "2026-05-19"
  generated_by: "plan-eng-review T4 pre-flight (LLM-assisted)"
  reviewer_count_total: 9
  reviewer_count_active: 7
  reviewer_count_inactive: 2

active_reviewers:
  # ─── completeness dim ───
  - name: aw-claim-validator
    dim: completeness
    active: true
    rationale: "PRD/SOP draft의 claim-evidence completeness 평가. text-based, alpha 단계 적용 가능"
  - name: aw-move-flow
    dim: completeness
    active: true
    rationale: "논증 흐름 (intro→method→result→discussion) 완전성. text-based"

  # ─── consistency dim ───
  - name: aw-consistency-checker
    dim: consistency
    active: true
    rationale: "PRD draft 내부 acronym / unit / 숫자 consistency. text-based"

  # ─── clarity dim ───
  - name: aw-ai-tell
    dim: clarity
    active: true
    rationale: "AI-generated 흔적 검출. text-based, alpha generic 적용"
  - name: aw-hedge-coach
    dim: clarity
    active: true
    rationale: "hedge level (claim 강도 vs evidence) 평가. text-based"
  - name: aw-style-checker
    dim: clarity
    active: true
    rationale: "battery domain notation/style. PRD draft에 일부 적용 가능 (단 alpha mock PRD가 Na-ion HC 도메인)"

  # ─── feasibility dim ───
  - name: aw-technical-reviewer
    dim: feasibility
    active: true
    rationale: "methodology reproducibility / 수식 / 물리 제약 검증. text-based"

  # ─── scope dim (NEW, internal_logic) ───
  - name: __internal__scope_dim_eval
    dim: scope
    active: true
    eval_method: internal_logic
    rationale: "spec-review-loop SKILL.md 내부 bash 로직. agent dispatch 없음. mockup figure_set frontmatter hypothetical:true flag vs input/ mtime 비교"
    score_mapping_source: "review_dimensions.yaml#scope.score_mapping"

inactive_reviewers:
  - name: aw-figure-vision
    dim: consistency
    active: false
    rationale: "mockup figure 이미지 부재 단계 (PRD/SOP draft만 있음). alpha의 mock artifact는 text-only. /paper-autopilot-open:ppt-image 호출 후 (rc1+) 에서 활성"
    activation_condition: "mockup figure PNG 존재 (mockup/<version>/Fig*.png) 시 활성"
  - name: aw-bibliography-auditor
    dim: consistency
    active: false
    rationale: "PRD 초기 단계에 .bib 또는 citation list 부재. alpha mock PRD는 가설 + 측정 계획 위주, citation은 미니멀. rc1+ 에서 manuscript draft 단계 활성"
    activation_condition: ".bib 또는 citation list 존재 + 5+ entries 시 활성"

# ─── alpha dispatch behavior ───
dispatch:
  mode: sequential
  rationale: "Task tool parallel concurrency는 alpha 검증 안 됨 (plan-eng-review BLOCKER2 사용자 (b) 결정). pre-flight에서 1/3/5/9 batch 측정 (정보 수집), alpha는 sequential 확정"
  reviewer_order:
    # 가벼운 (text-based generic) 먼저, 무거운 (technical/feasibility) 나중
    - aw-claim-validator
    - aw-move-flow
    - aw-consistency-checker
    - aw-ai-tell
    - aw-hedge-coach
    - aw-style-checker
    - aw-technical-reviewer
  scope_dim_eval_timing: "after all 7 active reviewer complete, before aggregation"

# ─── rc1+ migration plan ───
rc1_activation:
  - aw-figure-vision: "mockup figure_set + /paper-autopilot-open:ppt-image 호출 후 활성. 5 consistency dim agent로 통합"
  - aw-bibliography-auditor: "manuscript draft .bib 작성 후 활성. citation traversal로 claim-evidence 보강"
  - parallel_dispatch: "Task concurrency 측정 결과 따라 sequential→parallel migration. 정보는 alpha pre-flight에서 수집"
